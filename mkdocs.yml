site_name: Hermes Voice Core
site_description: A voice-first, GPU-accelerated interface for Hermes Agent on Linux
site_author: Hermes Voice Core
site_url: https://tfcollins.github.io/hermes-voice/

docs_dir: docs
site_dir: site
strict: true

nav:
  - Overview: index.md
  - Get started: getting-started.md
  - Use the interface: interface.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Operations: operations.md

not_in_nav: |
  includes/*

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Space Grotesk
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      width: 96vw
      height: auto
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.snippets:
      base_path: docs
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

extra:
  generator: false
  social:
    - icon: fontawesome/solid/microphone-lines
      link: http://127.0.0.1:8765
      name: Open Voice Core locally
  status:
    new: Recently added
