name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: python -m pip install --requirement requirements-docs.txt

      - name: Build documentation strictly
        run: python -m mkdocs build --strict --site-dir site

      - name: Validate generated site
        run: |
          test -s site/index.html
          test -s site/assets/screenshots/voice-core-overview.png
          grep -q "Talk to Hermes" site/index.html
          python - <<'PY'
          import json
          from pathlib import Path

          index = json.loads(Path("site/search/search_index.json").read_text())
          text = json.dumps(index)
          required = ["GPU transcription", "Voice activity", "Hermes session"]
          missing = [term for term in required if term.lower() not in text.lower()]
          if missing:
              raise SystemExit(f"Missing search-index terms: {missing}")
          PY

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
